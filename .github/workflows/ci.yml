name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            -r apps/services/api-gateway/requirements.runtime.txt \
            -r apps/services/knowledge-base/requirements.runtime.txt \
            pytest

      - name: Encoding check
        run: python scripts/quality/check-encoding.py

      - name: Python compile
        run: python -m compileall packages/python apps/services/api-gateway apps/services/knowledge-base

      - name: Pytest
        run: python -m pytest tests -q

      - name: Retrieval ablation smoke
        run: python scripts/evaluation/run-retrieval-ablation.py --fixture tests/fixtures/evals/retrieval-ablation-fixture.json --output artifacts/reports/ci_retrieval_ablation.json --summary-output artifacts/reports/ci_retrieval_ablation.md

      - name: Embedding benchmark smoke
        run: python scripts/evaluation/compare-embedding-providers.py --output artifacts/reports/ci_embedding_retrieval_benchmark.json --summary-output artifacts/reports/ci_embedding_retrieval_benchmark.md

      - name: Local ingest benchmark smoke
        run: python scripts/evaluation/benchmark-local-ingest.py --output artifacts/reports/ci_local_ingest_benchmark.json --summary-output artifacts/reports/ci_local_ingest_benchmark.md

      - name: Docker compose config
        run: docker compose config --quiet

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
