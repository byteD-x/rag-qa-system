# Logstash 配置（可选）- 用于高级日志聚合
# 如果使用 ELK stack，可以启用此配置

input {
  # 从 Docker 日志文件读取
  file {
    path => "/var/log/containers/*.log"
    start_position => "beginning"
  }
}

filter {
  # 解析 JSON 格式的日志
  json {
    source => "message"
    target => "parsed_log"
  }
  
  # 添加时间戳
  date {
    match => [ "[parsed_log][timestamp]", "ISO8601" ]
    target => "@timestamp"
  }
}

output {
  # 输出到 Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "rag-logs-%{+YYYY.MM.dd}"
  }
  
  # 同时输出到 stdout 用于调试
  stdout {
    codec => rubydebug
  }
}
