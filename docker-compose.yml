x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-common-auth-env: &common-auth-env
  JWT_SECRET: ${JWT_SECRET:-change-me-in-env}
  AUTH_TOKEN_TTL_MINUTES: ${AUTH_TOKEN_TTL_MINUTES:-720}
  ADMIN_USER_ID: ${ADMIN_USER_ID:-11111111-1111-1111-1111-111111111111}
  ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@local}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
  MEMBER_USER_ID: ${MEMBER_USER_ID:-22222222-2222-2222-2222-222222222222}
  MEMBER_EMAIL: ${MEMBER_EMAIL:-member@local}
  MEMBER_PASSWORD: ${MEMBER_PASSWORD:-ChangeMe123!}

x-object-storage-env: &object-storage-env
  OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:-http://minio:9000}
  OBJECT_STORAGE_PUBLIC_ENDPOINT: ${OBJECT_STORAGE_PUBLIC_ENDPOINT:-http://localhost:9000}
  OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-minioadmin}
  OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-minioadmin}
  OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-rag-assets}
  OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-us-east-1}
  OBJECT_STORAGE_ALLOWED_ORIGINS: ${OBJECT_STORAGE_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}

x-embedding-env: &embedding-env
  EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
  EMBEDDING_LOCAL_BACKEND: ${EMBEDDING_LOCAL_BACKEND:-projection}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-local-projection-512}
  EMBEDDING_API_URL: ${EMBEDDING_API_URL:-}
  EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
  EMBEDDING_TIMEOUT_SECONDS: ${EMBEDDING_TIMEOUT_SECONDS:-60}
  EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-64}

services:
  postgres:
    build:
      context: ./infra/postgres
      dockerfile: postgres.Dockerfile
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 20
    logging: *default-logging

  db-bootstrap:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag}
      PGHOST: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD:-rag}
    volumes:
      - ./infra/postgres/init/000_dual_kernel_bootstrap.sh:/bootstrap/000_dual_kernel_bootstrap.sh:ro
    entrypoint: ["/bin/sh", "/bootstrap/000_dual_kernel_bootstrap.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    logging: *default-logging

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY:-minioadmin}
    ports:
      - "${OBJECT_STORAGE_HOST_PORT:-9000}:9000"
      - "${OBJECT_STORAGE_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "wget -q -O- http://127.0.0.1:9000/minio/health/live >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
    logging: *default-logging

  novel-service:
    build:
      context: .
      dockerfile: apps/backend/novel-service/Dockerfile
    environment:
      <<: [*common-auth-env, *object-storage-env, *embedding-env]
      NOVEL_DATABASE_DSN: ${NOVEL_DATABASE_DSN:-postgresql://rag:rag@postgres:5432/novel_app}
      NOVEL_BLOB_ROOT: /data/novel
    volumes:
      - ./data/novel:/data/novel
    ports:
      - "${NOVEL_HOST_PORT:-8100}:8100"
    depends_on:
      db-bootstrap:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/healthz', timeout=3)"]
      interval: 5s
      timeout: 5s
      retries: 20
    logging: *default-logging

  novel-worker:
    build:
      context: .
      dockerfile: apps/backend/novel-service/Dockerfile
    command: ["python", "-m", "app.worker"]
    environment:
      <<: [*common-auth-env, *object-storage-env, *embedding-env]
      NOVEL_DATABASE_DSN: ${NOVEL_DATABASE_DSN:-postgresql://rag:rag@postgres:5432/novel_app}
      NOVEL_BLOB_ROOT: /data/novel
    volumes:
      - ./data/novel:/data/novel
    depends_on:
      db-bootstrap:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    logging: *default-logging

  kb-service:
    build:
      context: .
      dockerfile: apps/backend/kb-service/Dockerfile
    environment:
      <<: [*common-auth-env, *object-storage-env, *embedding-env]
      KB_DATABASE_DSN: ${KB_DATABASE_DSN:-postgresql://rag:rag@postgres:5432/kb_app}
      KB_BLOB_ROOT: /data/kb
    volumes:
      - ./data/kb:/data/kb
    ports:
      - "${KB_HOST_PORT:-8300}:8200"
    depends_on:
      db-bootstrap:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8200/healthz', timeout=3)"]
      interval: 5s
      timeout: 5s
      retries: 20
    logging: *default-logging

  kb-worker:
    build:
      context: .
      dockerfile: apps/backend/kb-service/Dockerfile
    command: ["python", "-m", "app.worker"]
    environment:
      <<: [*common-auth-env, *object-storage-env, *embedding-env]
      KB_DATABASE_DSN: ${KB_DATABASE_DSN:-postgresql://rag:rag@postgres:5432/kb_app}
      KB_BLOB_ROOT: /data/kb
    volumes:
      - ./data/kb:/data/kb
    depends_on:
      db-bootstrap:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    logging: *default-logging

  gateway:
    build:
      context: .
      dockerfile: apps/backend/gateway/Dockerfile
    environment:
      <<: *common-auth-env
      GATEWAY_DATABASE_DSN: ${GATEWAY_DATABASE_DSN:-postgresql://rag:rag@postgres:5432/gateway_app}
      GATEWAY_TIMEOUT_SECONDS: ${GATEWAY_TIMEOUT_SECONDS:-180}
      NOVEL_SERVICE_URL: ${NOVEL_SERVICE_URL:-http://novel-service:8100}
      KB_SERVICE_URL: ${KB_SERVICE_URL:-http://kb-service:8200}
      AI_CHAT_ENABLED: ${AI_CHAT_ENABLED:-true}
      AI_PROVIDER: ${AI_PROVIDER:-openai-compatible}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-}
      AI_CHAT_TIMEOUT_SECONDS: ${AI_CHAT_TIMEOUT_SECONDS:-120}
      AI_DEFAULT_TEMPERATURE: ${AI_DEFAULT_TEMPERATURE:-0.7}
      AI_DEFAULT_MAX_TOKENS: ${AI_DEFAULT_MAX_TOKENS:-2048}
      AI_SYSTEM_PROMPT: ${AI_SYSTEM_PROMPT:-}
      AI_EXTRA_BODY_JSON: ${AI_EXTRA_BODY_JSON:-{}}
      AI_PRICE_CURRENCY: ${AI_PRICE_CURRENCY:-CNY}
      AI_PRICE_TIERS_JSON: ${AI_PRICE_TIERS_JSON:-[]}
      AI_INPUT_PRICE_PER_1K_TOKENS: ${AI_INPUT_PRICE_PER_1K_TOKENS:-0}
      AI_OUTPUT_PRICE_PER_1K_TOKENS: ${AI_OUTPUT_PRICE_PER_1K_TOKENS:-0}
      CHAT_MAX_EVIDENCE: ${CHAT_MAX_EVIDENCE:-8}
      CHAT_HISTORY_MESSAGES: ${CHAT_HISTORY_MESSAGES:-8}
    ports:
      - "${GATEWAY_HOST_PORT:-8080}:8080"
    depends_on:
      novel-service:
        condition: service_healthy
      kb-service:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3)"]
      interval: 5s
      timeout: 5s
      retries: 20
    logging: *default-logging

volumes:
  postgres_data:
  minio_data:
