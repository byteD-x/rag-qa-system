services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rag}
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-rag}" ]
      interval: 5s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.13.6
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-02-08T19-14-21Z
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do sleep 2; done
        mc mb --ignore-existing local/${S3_BUCKET:-rag-raw}
        mc anonymous set private local/${S3_BUCKET:-rag-raw}
    restart: "no"

  py-rag-service:
    build:
      context: ./services/py-rag-service
    environment:
      PYTHONUNBUFFERED: "1"
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-rag_chunks}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-256}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_EMBEDDING_MODEL: ${LLM_EMBEDDING_MODEL:-text-embedding-3-small}
      LLM_CHAT_MODEL: ${LLM_CHAT_MODEL:-gpt-4o-mini}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-2}
      LLM_RETRY_DELAY_MILLISECONDS: ${LLM_RETRY_DELAY_MILLISECONDS:-600}
      RAG_RETRIEVAL_TOP_N: ${RAG_RETRIEVAL_TOP_N:-24}
      RAG_RERANK_TOP_K: ${RAG_RERANK_TOP_K:-8}
      RAG_SOURCE_SENTENCE_LIMIT: ${RAG_SOURCE_SENTENCE_LIMIT:-6}
      RAG_EVIDENCE_MIN_SCORE: ${RAG_EVIDENCE_MIN_SCORE:-0.05}
      RAG_COMMON_KNOWLEDGE_MAX_RATIO: ${RAG_COMMON_KNOWLEDGE_MAX_RATIO:-0.15}
      # RAG Optimization config
      HYBRID_SEARCH_DENSE_WEIGHT: ${HYBRID_SEARCH_DENSE_WEIGHT:-0.7}
      HYBRID_SEARCH_SPARSE_WEIGHT: ${HYBRID_SEARCH_SPARSE_WEIGHT:-0.3}
      RERANKER_MODEL: ${RERANKER_MODEL:-cross-encoder/ms-marco-MiniLM-L-6-v2}
      RERANKER_TOP_K: ${RERANKER_TOP_K:-8}
      QUERY_CACHE_ENABLED: ${QUERY_CACHE_ENABLED:-true}
      QUERY_CACHE_TTL_HOURS: ${QUERY_CACHE_TTL_HOURS:-24}
      QUERY_CACHE_MAX_SIZE: ${QUERY_CACHE_MAX_SIZE:-10000}
      DEFAULT_CHUNK_SIZE: ${DEFAULT_CHUNK_SIZE:-1024}
      DEFAULT_CHUNK_OVERLAP: ${DEFAULT_CHUNK_OVERLAP:-100}
      INTENT_CLASSIFICATION_ENABLED: ${INTENT_CLASSIFICATION_ENABLED:-true}
      METADATA_ENHANCEMENT_ENABLED: ${METADATA_ENHANCEMENT_ENABLED:-true}
      MAX_KEYWORDS: ${MAX_KEYWORDS:-5}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  py-worker:
    build:
      context: ./services/py-worker
    environment:
      PYTHONUNBUFFERED: "1"
      POSTGRES_DSN: ${POSTGRES_DSN:-postgres://rag:rag@postgres:5432/rag?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      INGEST_QUEUE_KEY: ${INGEST_QUEUE_KEY:-ingest_jobs}
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS:-5}
      WORKER_MAX_RETRIES: ${WORKER_MAX_RETRIES:-3}
      S3_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-rag-raw}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-rag_chunks}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-256}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_EMBEDDING_MODEL: ${LLM_EMBEDDING_MODEL:-text-embedding-3-small}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-2}
      LLM_RETRY_DELAY_MILLISECONDS: ${LLM_RETRY_DELAY_MILLISECONDS:-600}
      # RAG Optimization config
      DEFAULT_CHUNK_SIZE: ${DEFAULT_CHUNK_SIZE:-1024}
      DEFAULT_CHUNK_OVERLAP: ${DEFAULT_CHUNK_OVERLAP:-100}
      METADATA_ENHANCEMENT_ENABLED: ${METADATA_ENHANCEMENT_ENABLED:-true}
      MAX_KEYWORDS: ${MAX_KEYWORDS:-5}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      qdrant:
        condition: service_started

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      go-api:
        condition: service_started
    restart: unless-stopped

  go-api:
    build:
      context: ./services/go-api
    ports:
      - "8080:8080"
    environment:
      HTTP_ADDR: ${HTTP_ADDR:-:8080}
      POSTGRES_DSN: ${POSTGRES_DSN:-postgres://rag:rag@postgres:5432/rag?sslmode=disable}
      RAG_SERVICE_URL: ${RAG_SERVICE_URL:-http://py-rag-service:8000}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-524288000}
      AUTH_TOKEN_TTL_MINUTES: ${AUTH_TOKEN_TTL_MINUTES:-120}
      ADMIN_USER_ID: ${ADMIN_USER_ID:-11111111-1111-1111-1111-111111111111}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?}
      MEMBER_USER_ID: ${MEMBER_USER_ID:-22222222-2222-2222-2222-222222222222}
      MEMBER_EMAIL: ${MEMBER_EMAIL:?}
      MEMBER_PASSWORD: ${MEMBER_PASSWORD:?}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      INGEST_QUEUE_KEY: ${INGEST_QUEUE_KEY:-ingest_jobs}
      S3_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-localhost:19000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-rag-raw}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      S3_PRESIGN_EXPIRY_MINUTES: ${S3_PRESIGN_EXPIRY_MINUTES:-30}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-rag_chunks}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      py-rag-service:
        condition: service_started

  # 日志收集服务 - 实时聚合所有容器日志
  log-collector:
    image: alpine:latest
    command: >
      sh -c " mkdir -p /logs/by-service /logs/by-level /logs/all; touch /logs/all/combined.log /logs/error.log; echo 'Log collector started at $$(date)'; while true; do
        for service in go-api py-rag-service py-worker; do
          if docker compose logs --tail=0 $$service 2>/dev/null; then
            sleep 1;
          fi;
        done;
        sleep 5;
      done "
    volumes:
      - logs_data:/logs
    depends_on:
      - go-api
      - py-rag-service
      - py-worker
    profiles:
      - logging

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  logs_data:
