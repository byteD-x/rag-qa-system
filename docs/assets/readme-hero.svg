<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RAG-QA 2.0 README hero banner</title>
  <desc id="desc">A polished hero banner showing RAG-QA 2.0 capabilities, service boundaries, ingest pipeline, and grounded answer flow.</desc>

  <defs>
    <linearGradient id="bg" x1="22" y1="18" x2="1168" y2="504" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.42" stop-color="#0B1D33"/>
      <stop offset="1" stop-color="#0D3A43"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(194 108) rotate(16) scale(310 240)">
      <stop stop-color="#22D3EE" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1008 110) rotate(152) scale(344 274)">
      <stop stop-color="#14B8A6" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="61" y1="44" x2="1136" y2="476" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="panelStroke" x1="54" y1="38" x2="1144" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#93C5FD" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#2DD4BF" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="lineFlow" x1="650" y1="150" x2="1074" y2="324" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#5EEAD4"/>
    </linearGradient>
    <linearGradient id="pillFill" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F2D45"/>
      <stop offset="1" stop-color="#12394A"/>
    </linearGradient>
    <linearGradient id="accentFill" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#67E8F9"/>
    </linearGradient>
    <linearGradient id="metricFill" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0B2136" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#0E2A3D" stop-opacity="0.82"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" stroke="#B6CCF4" stroke-opacity="0.07"/>
    </pattern>
    <filter id="shadow" x="-48" y="-48" width="1296" height="616" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#01070F" flood-opacity="0.38"/>
    </filter>
    <filter id="softBlur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <marker id="arrowHead" markerWidth="12" markerHeight="12" refX="8.4" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#78D8F4"/>
    </marker>
  </defs>

  <rect width="1200" height="520" rx="32" fill="url(#bg)"/>
  <rect width="1200" height="520" rx="32" fill="url(#grid)"/>
  <circle cx="194" cy="108" r="218" fill="url(#glowLeft)"/>
  <circle cx="1008" cy="110" r="250" fill="url(#glowRight)"/>
  <circle cx="110" cy="430" r="120" fill="#F59E0B" fill-opacity="0.08" filter="url(#softBlur)"/>
  <circle cx="1112" cy="432" r="142" fill="#38BDF8" fill-opacity="0.08" filter="url(#softBlur)"/>

  <g filter="url(#shadow)">
    <rect x="40" y="36" width="1120" height="448" rx="30" fill="url(#glass)" stroke="url(#panelStroke)"/>
  </g>

  <rect x="68" y="64" width="196" height="34" rx="17" fill="#0A2134" fill-opacity="0.9" stroke="#8EDCF0" stroke-opacity="0.28"/>
  <circle cx="92" cy="81" r="5" fill="#2DD4BF"/>
  <text x="108" y="87" fill="#D9F7FF" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="14" font-weight="700" letter-spacing="1.7">LOCAL-FIRST ENTERPRISE RAG</text>

  <g opacity="0.9">
    <rect x="980" y="68" width="140" height="28" rx="14" fill="#0D2335" stroke="#7DD3FC" stroke-opacity="0.22"/>
    <text x="1004" y="86" fill="#BAE6FD" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="13" font-weight="700">TRACEABLE ANSWERS</text>
  </g>

  <text x="70" y="166" fill="#FFFFFF" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="64" font-weight="800">RAG-QA 2.0</text>
  <text x="70" y="214" fill="#CFFAFE" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="28" font-weight="700">Grounded retrieval, async ingest, and production-style service boundaries</text>

  <text x="70" y="266" fill="#D8E8F8" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="22">Built for teams that need more than a demo: multipart upload, staged indexing,</text>
  <text x="70" y="298" fill="#D8E8F8" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="22">auditable chat flows, health endpoints, and evidence-backed answers.</text>

  <g>
    <rect x="70" y="336" width="182" height="42" rx="21" fill="url(#accentFill)"/>
    <text x="100" y="362" fill="#082F49" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="18" font-weight="800">FastAPI + Vue 3</text>

    <rect x="264" y="336" width="188" height="42" rx="21" fill="url(#pillFill)" stroke="#CFFAFE" stroke-opacity="0.18"/>
    <text x="296" y="362" fill="#F5FAFF" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="18" font-weight="700">PostgreSQL + MinIO</text>

    <rect x="464" y="336" width="166" height="42" rx="21" fill="url(#pillFill)" stroke="#CFFAFE" stroke-opacity="0.18"/>
    <text x="500" y="362" fill="#F5FAFF" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="18" font-weight="700">SSE + Metrics</text>
  </g>

  <g>
    <rect x="70" y="402" width="132" height="70" rx="18" fill="url(#metricFill)" stroke="#7DD3FC" stroke-opacity="0.14"/>
    <text x="88" y="429" fill="#8FE7FF" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="14" font-weight="700">UPLOAD FLOW</text>
    <text x="88" y="458" fill="#FFFFFF" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="22" font-weight="800">Multipart</text>

    <rect x="216" y="402" width="132" height="70" rx="18" fill="url(#metricFill)" stroke="#86EFAC" stroke-opacity="0.14"/>
    <text x="234" y="429" fill="#9FE7B5" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="14" font-weight="700">INDEX STATE</text>
    <text x="234" y="458" fill="#FFFFFF" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="22" font-weight="800">Hybrid</text>

    <rect x="362" y="402" width="132" height="70" rx="18" fill="url(#metricFill)" stroke="#FDE68A" stroke-opacity="0.18"/>
    <text x="380" y="429" fill="#FDE68A" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="14" font-weight="700">ANSWER MODE</text>
    <text x="380" y="458" fill="#FFFFFF" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="22" font-weight="800">Grounded</text>

    <rect x="508" y="402" width="132" height="70" rx="18" fill="url(#metricFill)" stroke="#F9A8D4" stroke-opacity="0.18"/>
    <text x="526" y="429" fill="#FBCFE8" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="14" font-weight="700">OPERATIONS</text>
    <text x="526" y="458" fill="#FFFFFF" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="22" font-weight="800">Audit</text>
  </g>

  <g>
    <rect x="674" y="76" width="446" height="368" rx="24" fill="#071523" fill-opacity="0.6" stroke="#D7F9FF" stroke-opacity="0.12"/>
    <rect x="698" y="98" width="88" height="26" rx="13" fill="#0D2336" stroke="#79D8F5" stroke-opacity="0.24"/>
    <text x="721" y="115" fill="#C7F8FF" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="12" font-weight="700" letter-spacing="1.4">RUNTIME MAP</text>

    <rect x="710" y="146" width="158" height="82" rx="20" fill="#0B1F31" stroke="#8FD9F0" stroke-opacity="0.34"/>
    <circle cx="734" cy="171" r="7" fill="#7DD3FC"/>
    <text x="750" y="176" fill="#E9F8FF" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="19" font-weight="800">Gateway</text>
    <text x="734" y="202" fill="#D5E8F7" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="14">Auth, chat orchestration,</text>
    <text x="734" y="221" fill="#D5E8F7" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="14">auditing, traces, scopes</text>

    <rect x="936" y="146" width="158" height="82" rx="20" fill="#0B1F31" stroke="#6EE7B7" stroke-opacity="0.34"/>
    <circle cx="960" cy="171" r="7" fill="#86EFAC"/>
    <text x="976" y="176" fill="#E9F8FF" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="19" font-weight="800">KB Service</text>
    <text x="960" y="202" fill="#D5E8F7" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="14">Bases, docs, uploads,</text>
    <text x="960" y="221" fill="#D5E8F7" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="14">retrieval and query APIs</text>

    <rect x="710" y="276" width="158" height="82" rx="20" fill="#0B1F31" stroke="#F9A8D4" stroke-opacity="0.34"/>
    <circle cx="734" cy="301" r="7" fill="#F9A8D4"/>
    <text x="750" y="306" fill="#E9F8FF" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="19" font-weight="800">Worker</text>
    <text x="734" y="332" fill="#D5E8F7" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="14">Parse, chunk, embed,</text>
    <text x="734" y="351" fill="#D5E8F7" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="14">retry and job progression</text>

    <rect x="936" y="276" width="158" height="82" rx="20" fill="#0B1F31" stroke="#FCD34D" stroke-opacity="0.34"/>
    <circle cx="960" cy="301" r="7" fill="#FDE68A"/>
    <text x="976" y="306" fill="#E9F8FF" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="19" font-weight="800">Storage</text>
    <text x="960" y="332" fill="#D5E8F7" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="14">PostgreSQL metadata</text>
    <text x="960" y="351" fill="#D5E8F7" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="14">and MinIO object storage</text>

    <path d="M868 187H936" stroke="url(#lineFlow)" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowHead)"/>
    <path d="M1015 228V276" stroke="url(#lineFlow)" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowHead)"/>
    <path d="M868 317H936" stroke="url(#lineFlow)" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowHead)"/>
    <path d="M789 228V276" stroke="url(#lineFlow)" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowHead)"/>

    <rect x="694" y="388" width="176" height="34" rx="17" fill="#0D2437" stroke="#7DD3FC" stroke-opacity="0.18"/>
    <circle cx="718" cy="405" r="5" fill="#7DD3FC"/>
    <text x="732" y="410" fill="#DFF8FF" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="14" font-weight="700">uploaded -> hybrid_ready -> ready</text>
  </g>

  <g>
    <rect x="648" y="118" width="92" height="42" rx="21" fill="#082033" stroke="#7DD3FC" stroke-opacity="0.18"/>
    <text x="671" y="144" fill="#DFF8FF" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="15" font-weight="700">Web / API</text>
    <path d="M740 139H710" stroke="#7DD3FC" stroke-width="3" stroke-linecap="round"/>
  </g>

  <g>
    <rect x="908" y="382" width="212" height="78" rx="20" fill="#071827" fill-opacity="0.86" stroke="#D8F7FF" stroke-opacity="0.14"/>
    <text x="928" y="406" fill="#8FE7FF" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="13" font-weight="700" letter-spacing="1.3">GROUNDED ANSWER</text>
    <text x="928" y="430" fill="#FFFFFF" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="16" font-weight="700">Answer with citations, score, latency, trace_id</text>
    <rect x="928" y="440" width="72" height="8" rx="4" fill="#22C55E" fill-opacity="0.95"/>
    <rect x="1008" y="440" width="44" height="8" rx="4" fill="#38BDF8" fill-opacity="0.95"/>
    <rect x="1060" y="440" width="36" height="8" rx="4" fill="#F59E0B" fill-opacity="0.95"/>
  </g>

  <g opacity="0.42">
    <path d="M610 82C654 98 675 110 697 136" stroke="#5EEAD4" stroke-width="2"/>
    <path d="M602 108C640 126 660 142 677 166" stroke="#38BDF8" stroke-width="2"/>
    <path d="M610 420C656 392 682 376 712 356" stroke="#5EEAD4" stroke-width="2"/>
  </g>
</svg>
