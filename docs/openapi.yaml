  /metrics/cache:
    get:
      tags:
        - Metrics
      summary: 查询缓存指标
      description: |
        查询 RAG 查询缓存的统计信息
        
        ## 返回字段
        - `enabled`: 缓存是否启用
        - `available`: 缓存是否可用
        - `size`: 当前缓存大小
        - `max_size`: 最大缓存容量
        - `hits`: 命中次数
        - `misses`: 未命中次数
        - `hit_rate`: 命中率
      operationId: cacheMetrics
      responses:
